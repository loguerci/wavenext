# Config file for training WaveNeXt model

duration: 1
#duration: 0.68

# Model hyperparameters
#sample_rate: 48000 
sample_rate: 24000

#fft_dim: 2048
fft_dim: 1024

dim: 512
#shift_dim: 512
shift_dim: 256
n_mels: 80
k: 3

# Training hyperparameters
batch_size: 8
num_workers: 4
num_epochs: 1000
learning_rate: 0.0002
log_dir: "logs"

accelerator: "cuda"
devices: 1

train_csv: "libritts_train.csv"
val_csv: "libritts_val.csv"

resume: true
